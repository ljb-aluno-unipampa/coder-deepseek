services:
  gw:
    build:
      context: .
      dockerfile: docker/gateway/Dockerfile
    container_name: gateway
    privileged: true                 # necessário para manipular redes e nftables
    environment:
      - GATEWAY_LAN_IP=${GATEWAY_LAN_IP:-192.168.100.1}
      - DHCP_POOL_START=${DHCP_POOL_START:-192.168.100.100}
      - DHCP_POOL_END=${DHCP_POOL_END:-192.168.100.200}
      - DHCP_DNS_SERVERS=${DHCP_DNS_SERVERS:-8.8.8.8, 1.1.1.1}
      - ADMIN_API_PORT=${ADMIN_API_PORT:-8080}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-lab123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${ADMIN_API_PORT:-8080}:8080"
    networks:
      wan:                          # rede externa (com acesso à Internet)
        interface_name: eth0
      lan:
        interface_name: eth1
        ipv4_address: ${GATEWAY_LAN_IP:-192.168.100.1}
    restart: unless-stopped

  client1:
    build: ./docker/client
    container_name: client1
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - lan
    depends_on:
      - gw
    restart: unless-stopped


  client2:
    build: ./docker/client
    container_name: client2
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - lan
    depends_on:
      - gw
    restart: unless-stopped

networks:
  wan:
    driver: bridge
    # Nome explícito para facilitar testes manuais
    name: lab_wan
  lan:
    driver: bridge
    internal: true                  # isola completamente a LAN
    ipam:
      config:
        - subnet: ${LAN_SUBNET:-192.168.100.0/24}
          gateway: ${LAN_DOCKER_GATEWAY:-192.168.100.254}
    name: lab_lan
